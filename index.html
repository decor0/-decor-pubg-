    // بناء كائن البحث العكسي سريع لكل نمط
    function buildReverseMap(mapObj) {
        const lower = mapObj.lower;
        const upper = mapObj.upper;
        const rev = {};
        const letters = 'abcdefghijklmnopqrstuvwxyz';
        const lettersUpper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        for (let i = 0; i < 26; i++) {
            rev[letters[i]] = lower[i];
            rev[lettersUpper[i]] = upper[i];
        }
        return rev;
    }

    // تحويل النص باستخدام خريطة معينة
    function transformText(text, mapObj) {
        const revMap = buildReverseMap(mapObj);
        let result = '';
        for (let char of text) {
            if (revMap[char]) {
                result += revMap[char];
            } else {
                result += char;
            }
        }
        return result;
    }

        const cleanName = name.trim();
        const results = [];

        // --- الزخارف الإنجليزية (إذا احتوى الاسم على أحرف إنجليزية) ---
        const hasEnglish = /[a-zA-Z]/.test(cleanName);
        if (hasEnglish) {
            const styleNames = Object.keys(styleMaps);
            for (let key of styleNames) {
                const styled = transformText(cleanName, styleMaps[key]);
                if (styled && styled !== cleanName) {
                    results.push({
                        text: styled,
                        style: key.replace(/([A-Z])/g, ' $1').trim()
                    });
                }
            }
        }

        // --- الزخارف العربية (إذا احتوى على أحرف عربية أو حتى إنجليزية نلفها) ---
        // نطبق الـ wraps على النص كاملاً (سواء عربي أو إنجليزي)
        for (let wrap of arabicWraps) {
            const wrapped = wrap.prefix + cleanName + wrap.suffix;
            if (wrapped !== cleanName) {
                results.push({
                    text: wrapped,
                    style: `زخرفة ${wrap.prefix}`
                });
            }
        }

        const reversed = cleanName.split('').reverse().join('');
        if (reversed !== cleanName) {

            results.push({ text: `❂ ${reversed} ❂`, style: 'معكوس فخم' });
        }

        // 2. تكرار النص
        results.push({ text: `${cleanName} ${cleanName}`, style: 'مكرر بسيط' });
        results.push({ text: `◥${cleanName}◤ ${cleanName}◥${cleanName}◤`, style: 'مكرر مربع' });

        // 3. إضافة رموز قوية مخصصة
        results.push({ text: `⛩️ ${cleanName} ⛩️`, style: 'ضريحي' });
        results.push({ text: `☬ ${cleanName} ☬`, style: 'ملكي' });
        results.push({ text: `✿ ${cleanName} ✿`, style: 'وردي' });
        results.push({ text: `⍟ ${cleanName} ⍟`, style: 'نجمي' });
        results.push({ text: `⎛⎝ ${cleanName} ⎠⎞`, style: 'قوسين' });

        // إزالة التكرارات حسب النص للحصول على قائمة فريدة
        const seen = new Set();
        const uniqueResults = [];
        for (let item of results) {
            if (!seen.has(item.text)) {
                seen.add(item.text);
                uniqueResults.push(item);
            }
        }

        return uniqueResults;
    }

    // ===== 4. عرض الزخارف في الواجهة =====
    function renderResults(name) {
        const grid = document.getElementById('resultGrid');
        const counter = document.getElementById('countNumber');
        
        if (!name || name.trim() === '') {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#555; padding:40px;">✏️ اكتب اسمك في الأعلى وستظهر الزخارف هنا</div>`;
            counter.innerText = '0';
            return;
        }

        const styles = generateAllStyles(name);
        counter.innerText = styles.length;

        if (styles.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#555; padding:40px;">😅 لا توجد زخارف متاحة لهذا الاسم</div>`;
            return;
        }

        let html = '';
        for (let item of styles) {
            // تجاهل تام لأي نصوص برمجية خبيثة
            const safeText = item.text.replace(/[<>]/g, '');
            html += `
                <div class="card">
                    <span class="text" dir="ltr">${safeText}</span>
                    <button class="copy-btn" onclick="copyText('${safeText}', this)" title="انسخ الزخرفة">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    // ===== 5. وظيفة النسخ =====
    function copyText(text, button) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`✅ تم نسخ: ${text.substring(0, 20)}...`);
                flashButton(button);
            }).catch(() => {
                fallbackCopy(text, button);
            });
        } else {
            fallbackCopy(text, button);
        }
    }

    function fallbackCopy(text, button) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast(`✅ تم نسخ: ${text.substring(0, 20)}...`);
            flashButton(button);
        } catch (err) {
            showToast('❌ فشل النسخ، حاول يدوياً');
        }
        document.body.removeChild(textarea);
    }

    function flashButton(button) {
        button.classList.add('copied');
        setTimeout(() => {
            button.classList.remove('copied');
        }, 800);
    }

    // ===== 6. Toast =====
    let toastTimeout = null;
    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 2200);
    }

    // ===== 7. ربط الأحداث =====
    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('nameInput');
        const generateBtn = document.getElementById('generateBtn');

        // توليد فوري عند كتابة الاسم (تأخير بسيط)
        let typingTimer;
        input.addEventListener('input', function() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                renderResults(this.value);
            }, 250);
        });

        // توليد عند الضغط على الزر
        generateBtn.addEventListener('click', function() {
            renderResults(input.value);
        });

        // توليد تلقائي عند تحميل الصفحة للاسم الافتراضي "Zero"
        if (input.value) {
            setTimeout(() => renderResults(input.value), 100);
        }
    });
</script>
